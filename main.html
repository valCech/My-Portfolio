<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>My Portfolio</title>
    <script src="https://kit.fontawesome.com/4d77a8d609.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <script defer src="index.js"></script>
</head>   
<body>
    <header>
      <div id="sound">       
        <!-- iframe that doesn't play anything just to trigger the autoplay in the first load -->
        <iframe src="./250-milliseconds-of-silence.mp3" allow="autoplay" id="audio" style="display: none"></iframe>
        <audio loop id="myAudio">
          <source src="./Mineral_-_HRCRX.mp3" type="audio/mp3">
        </audio>
        <i class="fab fa-soundcloud sound-cloud"></i>
        <span>Sound</span>
        <div class="on-off">
          <span id="off">OFF</span>
          <span id="on">ON</span>
        </div>      
      </div>
      <div id="MyClockDisplay" class="clock" onload="showTime()">
      </div>
      <div class="btns_container">
          <i class="fa-solid fa-bars bars"></i>
          <i class="fa-solid fa-xmark times"></i>
      </div>
    </header>
    <!--  sidebar -->
    <aside class="aside">
      <div class="aside_wrapper">
        <div class="logo_section">
          <a class="logo" rel="home" href="#">
            <img id=image src="./Transparent4K.png" alt="logo letter V">
            <span>Val</span>
          </a>
          <span>web de<span id="name_v">v</span>e<span id="name_l">l</span>oper</span>
        </div>
        <nav class="nav_links show_now">        
            <a href="#about">About</a>
            <a href="#skills">Skills</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>         
        </nav>
        <!-- social media icons -->
        <ul class="social_icons">
          <li><a href="https://github.com/valCech" target="_blank"><i class="fa-brands fa-github"></i></a></li>
          <li><a href="https://www.instagram.com/ifitboy/" target="_blank"><i class="fa-brands fa-instagram"></i></a></li>
          <li><a href="https://www.linkedin.com/in/vlastimil-šlechta-2988b3104/" target="_blank"><i class="fa-brands fa-linkedin"></i></a></li>
        </ul>
      </div>
    </aside>
    <!-- Section one -->
    <section class="section_one" id="section_home">
      <div class="text_zone">
        <h1><span id="heading">Hi,</span><br>
          I'm
        <img id="logo_size" src="./Transparent4K.png" alt="Val's logo V">al,
        <br>Web Developer
        </h1>
      <p class="gray_text" >Front End Developer | JavaScript Expert</p>
      <br>
      <a href="#" class="contact_button" >
          <div>
              <span class="bg"></span>
              <span class="base"></span>
              <span class="text">
                    Contact me!
              </span>      
          </div>
        </a>
      </div>
      <!-- Animation   -->
      <div class="scroll_down scroll_down_right">
        <span>scroll down</span>
        <i class="fa-solid fa-arrow-down"></i>
      </div>

      <div class="scroll_down scroll_down_left">
        <span>scroll down</span>
        <i class="fa-solid fa-arrow-down"></i>
      </div>
    </section>   
</body> 
</html>
